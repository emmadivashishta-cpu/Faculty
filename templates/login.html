{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block login_content %}
<div class="container h-100 d-flex justify-content-center align-items-center">
    <div class="card login-card shadow-lg border-0">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <div class="login-icon-bg mx-auto mb-3">
                    <i class="fas fa-university fa-2x text-white"></i>
                </div>
                <h3 class="fw-bold mb-1" style="color: var(--primary-color);">Impact Analysis</h3>
                <p class="text-muted">Sign in to your dashboard</p>
            </div>

            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com"
                        required>
                    <label for="email"><i class="fas fa-envelope me-2 text-muted"></i>Email address</label>
                </div>
                <div class="form-floating mb-4">
                    <input type="password" class="form-control" id="password" name="password" placeholder="Password"
                        required>
                    <label for="password"><i class="fas fa-lock me-2 text-muted"></i>Password</label>
                </div>
                <button class="btn btn-primary w-100 py-3 fw-bold login-btn" type="submit">Log In</button>
            </form>

            <div class="mt-4 text-center">
                <small class="text-muted">
                    Test Accounts:<br>
                    <strong>Admin:</strong> admin@university.edu / admin123<br>
                    <strong>Faculty:</strong> alice@university.edu / faculty123
                </small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
